<html>
<head>
    <style>
        body {
            background-color: #eeffff;
        }
        #rainbow {
            font-size: 36px;
            text-align: center;
            animation: color-change 2s infinite;
        }

        @keyframes color-change {
            0% {
                color: red;
            }

            50% {
                color: blue;
            }

            100% {
                color: red;
            }
        }
    </style>
</head>
<body>
    <h1 id="rainbow">Quick Chat</h1>
</body>
</html>
