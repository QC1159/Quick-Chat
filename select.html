<!doctype html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>Quick Chat</title>
    <style>
        /* Add your CSS rules here */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        .Name {
            margin: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .slb {
            background-color: #0074D9;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition-duration: 100ms;
        }

            .slb:hover {
                background-color: #0054B9;
            }

            .slb:active {
                background-color: #00A4F9;
            }
    </style>
    <script>
        function getParameterByName(name) {
            var urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }  
    </script>
</head>
<body>
    <div class="container">
        <input type="text" class="Name" placeholder="Username" id="Username">
        <button class="slb" onclick="window.location.replace('client.html?from=' + getParameterByName('from') + '&to=' + document.getElementById('Username').value + '&pass=' + getParameterByName('pass'))">CHAT!</button>
    </div>
</body>
</html>
